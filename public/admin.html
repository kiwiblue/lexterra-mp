<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lexterra Admin — Coins</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #e8e8e8; min-height: 100vh; padding: 24px 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #f5c842; margin-bottom: 4px; }
  .subtitle { font-size: 0.78rem; color: #888; margin-bottom: 24px; }
  .card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #888; margin-bottom: 16px; }
  .auth-row { display: flex; gap: 8px; align-items: center; }
  .auth-row input { flex: 1; background: #252525; border: 1px solid #383838; border-radius: 6px; padding: 9px 12px; color: #e8e8e8; font-size: 0.9rem; outline: none; }
  .auth-row input:focus { border-color: #f5c842; }
  .btn { background: #f5c842; color: #111; border: none; border-radius: 6px; padding: 9px 18px; font-size: 0.88rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: #ffd55a; }
  .btn.secondary { background: #2a2a2a; color: #ccc; }
  .btn.secondary:hover { background: #333; color: #fff; }
  .btn.danger { background: transparent; color: #f55; border: 1px solid #f55; }
  .msg { font-size: 0.82rem; padding: 8px 12px; border-radius: 6px; margin-top: 8px; display: none; }
  .msg.ok { background: #1a3a1a; color: #6f6; border: 1px solid #2a5a2a; }
  .msg.err { background: #3a1a1a; color: #f66; border: 1px solid #5a2a2a; }
  .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #f5c842; margin: 16px 0 8px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
  .field label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 4px; }
  .field input[type=number] { width: 100%; background: #252525; border: 1px solid #383838; border-radius: 6px; padding: 8px 10px; color: #e8e8e8; font-size: 0.9rem; outline: none; }
  .field input[type=number]:focus { border-color: #f5c842; }
  .form-footer { display: flex; gap: 8px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
  .form-footer .save-msg { flex: 1; font-size: 0.82rem; color: #aaa; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  th { text-align: left; padding: 6px 10px; color: #888; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #2a2a2a; }
  td { padding: 8px 10px; border-bottom: 1px solid #1e1e1e; }
  tr:last-child td { border-bottom: none; }
  .coins-val { font-weight: 700; color: #f5c842; }
  #players-section { display: none; }
  .loading { color: #555; font-size: 0.85rem; padding: 16px 0; text-align: center; }
</style>
</head>
<body>

<h1>Lexterra Admin</h1>
<p class="subtitle">Coin economy settings &amp; player balances</p>

<div class="card" id="auth-card">
  <h2>Authentication</h2>
  <div class="auth-row">
    <input type="password" id="pwd" placeholder="Admin password" autocomplete="current-password">
    <button class="btn" onclick="loadAll()">Load</button>
  </div>
  <div class="msg" id="auth-msg"></div>
</div>

<div id="config-section" style="display:none">
  <div class="card">
    <h2>Coin Earn Weights</h2>

    <div class="section-label">Daily bonuses</div>
    <div class="grid">
      <div class="field"><label>First play of day</label><input type="number" id="firstPlayOfDay" min="0"></div>
      <div class="field"><label>First win of day</label><input type="number" id="firstWinOfDay" min="0"></div>
    </div>

    <div class="section-label">Game win (by board size)</div>
    <div class="grid">
      <div class="field"><label>Win on 5×5</label><input type="number" id="gameWin_5" min="0"></div>
      <div class="field"><label>Win on 8×8</label><input type="number" id="gameWin_8" min="0"></div>
      <div class="field"><label>Win on 10×10</label><input type="number" id="gameWin_10" min="0"></div>
    </div>

    <div class="section-label">Win vs human (extra, by board size)</div>
    <div class="grid">
      <div class="field"><label>Human win on 5×5</label><input type="number" id="gameWinHuman_5" min="0"></div>
      <div class="field"><label>Human win on 8×8</label><input type="number" id="gameWinHuman_8" min="0"></div>
      <div class="field"><label>Human win on 10×10</label><input type="number" id="gameWinHuman_10" min="0"></div>
    </div>

    <div class="section-label">Personal high scores</div>
    <div class="grid">
      <div class="field"><label>Daily high score</label><input type="number" id="highScoreDay" min="0"></div>
      <div class="field"><label>Monthly high score</label><input type="number" id="highScoreMonth" min="0"></div>
      <div class="field"><label>Yearly high score</label><input type="number" id="highScoreYear" min="0"></div>
    </div>

    <div class="section-label">Score &amp; word bonuses</div>
    <div class="grid">
      <div class="field"><label>Points per coin (interval)</label><input type="number" id="pointsInterval" min="1"></div>
      <div class="field"><label>Long word bonus (per word)</label><input type="number" id="longWordBonus" min="0"></div>
    </div>
  </div>

  <div class="card">
    <h2>Coin Spend Costs</h2>
    <div class="grid">
      <div class="field"><label>Undo letter placement</label><input type="number" id="spendUndoLetter" min="0"></div>
      <div class="field"><label>View unclaimed words</label><input type="number" id="spendViewUnclaimed" min="0"></div>
      <div class="field"><label>Premium colour (1 month)</label><input type="number" id="spendPremiumColor" min="0"></div>
      <div class="field"><label>Custom tile pattern</label><input type="number" id="spendCustomTile" min="0"></div>
    </div>

    <div class="form-footer">
      <button class="btn" onclick="saveConfig()">Save changes</button>
      <button class="btn secondary" onclick="loadAll()">Reload</button>
      <span class="save-msg" id="save-msg"></span>
    </div>
  </div>

  <div class="card" id="players-section">
    <h2>Player Coin Balances</h2>
    <div id="players-table"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
const HOST = window.location.hostname === "localhost"
  ? "http://localhost:1999"
  : "https://lexterra-mp.kiwiblue.partykit.dev";
const STATS = `${HOST}/parties/stats/main`;

const FIELD_KEYS = [
  "firstPlayOfDay","firstWinOfDay",
  "gameWin_5","gameWin_8","gameWin_10",
  "gameWinHuman_5","gameWinHuman_8","gameWinHuman_10",
  "highScoreDay","highScoreMonth","highScoreYear",
  "pointsInterval","longWordBonus",
  "spendUndoLetter","spendViewUnclaimed","spendPremiumColor","spendCustomTile",
];

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = "block";
  if (type === "ok") setTimeout(() => { el.style.display = "none"; }, 3000);
}

async function loadAll() {
  const pwd = document.getElementById("pwd").value.trim();
  if (!pwd) { showMsg("auth-msg", "Enter the admin password.", "err"); return; }

  // Load config (public endpoint)
  let cfg;
  try {
    const r = await fetch(`${STATS}?config`);
    if (!r.ok) throw new Error(r.statusText);
    cfg = await r.json();
  } catch (e) {
    showMsg("auth-msg", `Could not load config: ${e.message}`, "err");
    return;
  }

  // Load player balances (admin endpoint)
  let players;
  try {
    const r = await fetch(STATS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "admin_data", password: pwd }),
    });
    if (r.status === 401) { showMsg("auth-msg", "Wrong password.", "err"); return; }
    if (!r.ok) throw new Error(r.statusText);
    players = await r.json();
  } catch (e) {
    showMsg("auth-msg", `Could not load players: ${e.message}`, "err");
    return;
  }

  // Populate fields
  for (const key of FIELD_KEYS) {
    const el = document.getElementById(key);
    if (el && cfg[key] !== undefined) el.value = cfg[key];
  }

  // Populate players table
  renderPlayers(players);

  document.getElementById("config-section").style.display = "block";
  document.getElementById("players-section").style.display = "block";
  document.getElementById("auth-msg").style.display = "none";
}

function renderPlayers(players) {
  const wrap = document.getElementById("players-table");
  if (!players.length) { wrap.innerHTML = '<div class="loading">No players yet.</div>'; return; }
  let html = '<table><thead><tr><th>#</th><th>Name</th><th>Coins</th><th>Last Play</th><th>Last Win</th></tr></thead><tbody>';
  players.forEach((p, i) => {
    html += `<tr>
      <td>${i + 1}</td>
      <td>${esc(p.name ?? "Unknown")}</td>
      <td class="coins-val">${p.coins ?? 0}</td>
      <td>${p.lastPlayDate ?? "—"}</td>
      <td>${p.lastWinDate ?? "—"}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function saveConfig() {
  const pwd = document.getElementById("pwd").value.trim();
  if (!pwd) { showMsg("auth-msg", "Enter the admin password.", "err"); return; }
  const config = {};
  for (const key of FIELD_KEYS) {
    const el = document.getElementById(key);
    if (el) config[key] = Number(el.value);
  }
  try {
    const r = await fetch(STATS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "config_update", password: pwd, config }),
    });
    if (r.status === 401) { document.getElementById("save-msg").textContent = "Wrong password."; return; }
    if (!r.ok) throw new Error(r.statusText);
    document.getElementById("save-msg").textContent = "Saved ✓";
    setTimeout(() => { document.getElementById("save-msg").textContent = ""; }, 3000);
  } catch (e) {
    document.getElementById("save-msg").textContent = `Error: ${e.message}`;
  }
}

document.getElementById("pwd").addEventListener("keydown", e => { if (e.key === "Enter") loadAll(); });
</script>
</body>
</html>
